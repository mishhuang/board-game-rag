version: 1.1.5

cache: true

interface:
  appTitle: "Board Game Rules Assistant"

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - claude-sonnet-4-20250514
  
  google:
    apiKey: "${GEMINI_API_KEY}"
    models:
      default:
        - gemini-2.0-flash
        - gemini-1.5-flash
        - gemini-1.5-pro
      fetch: false

  custom:
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          - llama-3.1-70b-versatile
          - llama-3.3-70b-versatile
          - mixtral-8x7b-32768
        fetch: false
      titleConvo: true
      titleModel: "llama-3.1-70b-versatile"
      modelDisplayLabel: "Groq"

    - name: "OpenAI"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "https://api.openai.com/v1"
      models:
        default:
          - gpt-4o
          - gpt-4o-mini
          - gpt-4.1
        fetch: false
      titleConvo: true
      titleModel: "gpt-4o-mini"
      modelDisplayLabel: "OpenAI"

    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default:
          - llama3.1:8b
          - mistral
          - qwen3:8b
        fetch: false
      titleConvo: true
      titleModel: "llama3.1:8b"
      modelDisplayLabel: "Ollama"

fileConfig:
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 50
      supportedMimeTypes:
        - "application/pdf"