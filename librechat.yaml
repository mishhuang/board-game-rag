version: 1.1.5

cache: true

interface:
  appTitle: "Board Game Rules Assistant"

endpoints:
  custom:
    - name: "Gemini"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai"
      models:
        default:
          - gemini-2.0-flash
          - gemini-1.5-flash
          - gemini-1.5-pro
        fetch: false
      titleConvo: true
      titleModel: "gemini-2.0-flash"
      modelDisplayLabel: "Gemini"
      
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default:
          - llama-3.1-70b-versatile
          - llama-3.3-70b-versatile
          - mixtral-8x7b-32768
        fetch: false
      titleConvo: true
      titleModel: "llama-3.1-70b-versatile"
      modelDisplayLabel: "Groq"

    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default:
          - llama3.1:8b
          - mistral
          - qwen3:8b
        fetch: false
      titleConvo: true
      titleModel: "llama3.1:8b"
      modelDisplayLabel: "Ollama"

fileConfig:
  endpoints:
    default:
      fileLimit: 5
      fileSizeLimit: 10
      totalSizeLimit: 50
      supportedMimeTypes:
        - "application/pdf"